<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FightDrill</title>
    <link rel="preconnect" href="https://pyscript.net" crossorigin>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link rel="stylesheet" href="https://pyscript.net/releases/2026.6.1/core.css">
    <script type="module" src="https://pyscript.net/releases/2026.6.1/core.js"></script>
    <style>
        :root {
            --bg: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --text: #e4e4e4;
            --text-muted: #a0a0b0;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --green: #2ecc71;
            --yellow: #f1c40f;
            --blue: #3498db;
            --radius: 8px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        #app {
            max-width: 720px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        h1 { font-size: 1.8rem; margin-bottom: 0.5rem; }
        h2 { font-size: 1.2rem; margin: 1.5rem 0 0.75rem; color: var(--text-muted); }

        .subtitle { color: var(--text-muted); margin-bottom: 1rem; }

        /* --- Home header --- */
        .home-header { display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
        .btn-config {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text);
            width: 2.5rem;
            height: 2.5rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1.3rem;
            line-height: 1;
        }
        .btn-config:hover { border-color: var(--accent); }

        /* --- Settings --- */
        .settings-section { display: flex; flex-direction: column; gap: 0.5rem; }
        .settings-section label { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }
        .settings-section input[type=range] { width: 100%; accent-color: var(--accent); }

        /* --- Navigation cards --- */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.75rem;
        }

        .nav-card {
            background: var(--bg-card);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: var(--radius);
            padding: 1.25rem 1rem;
            cursor: pointer;
            text-align: center;
            color: var(--text);
            transition: transform 0.15s, border-color 0.15s;
            display: flex;
            flex-direction: column;
            gap: 0.3rem;
        }
        .nav-card:hover { transform: translateY(-2px); border-color: var(--accent); }
        .card-icon { font-size: 2rem; }
        .card-title { font-weight: 600; font-size: 1rem; }
        .card-desc { font-size: 0.8rem; color: var(--text-muted); }
        .nav-card--manage { padding: 0.8rem; }

        /* --- Page header --- */
        .page-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .page-header h1 { margin-bottom: 0; }

        .btn-back {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            color: var(--text);
            padding: 0.4rem 0.8rem;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-back:hover { border-color: var(--accent); }

        /* --- Config forms --- */
        .config-form {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.25rem;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .config-form label {
            display: flex;
            flex-direction: column;
            gap: 0.25rem;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        .config-form input,
        .config-form select,
        .config-form textarea {
            background: var(--bg-input);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius);
            padding: 0.5rem 0.75rem;
            color: var(--text);
            font-size: 1rem;
        }
        .config-form input:focus,
        .config-form select:focus,
        .config-form textarea:focus {
            outline: none;
            border-color: var(--accent);
        }
        .config-form fieldset {
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius);
            padding: 0.75rem;
        }
        .config-form legend { color: var(--text-muted); font-size: 0.9rem; padding: 0 0.4rem; }

        .checkbox-label {
            flex-direction: row !important;
            align-items: center;
            gap: 0.5rem !important;
            color: var(--text) !important;
        }

        .error-msg { color: var(--accent); font-size: 0.85rem; min-height: 1.2em; }
        .empty-msg { color: var(--text-muted); text-align: center; padding: 2rem 0; }

        /* --- Buttons --- */
        .btn-primary, .btn-secondary, .btn-danger {
            padding: 0.6rem 1.5rem;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            transition: background 0.15s;
        }
        .btn-primary { background: var(--accent); color: #fff; }
        .btn-primary:hover { background: var(--accent-hover); }
        .btn-secondary { background: var(--blue); color: #fff; }
        .btn-secondary:hover { opacity: 0.85; }
        .btn-danger { background: #c0392b; color: #fff; }
        .btn-danger:hover { background: #e74c3c; }
        .btn-small { padding: 0.3rem 0.8rem; font-size: 0.8rem; }

        /* --- Running display --- */
        .running-display { text-align: center; }

        .timer-display {
            font-size: 4rem;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
            margin: 1rem 0;
        }

        .timer-info {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .phase-badge {
            padding: 0.2rem 0.8rem;
            border-radius: var(--radius);
            font-weight: 600;
            font-size: 0.9rem;
        }
        .phase-work { background: var(--green); color: #000; }
        .phase-rest { background: var(--yellow); color: #000; }

        .timer-controls { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; }

        /* --- Stimulus / Combo / Move display --- */
        .stimulus-zone {
            font-size: 2.5rem;
            font-weight: 700;
            min-height: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 1rem 0;
            transition: opacity 0.3s;
        }
        .stimulus-flash { animation: flash 0.5s ease-out; }
        @keyframes flash {
            0% { color: var(--accent); transform: scale(1.3); }
            100% { color: var(--text); transform: scale(1); }
        }

        .combo-display { margin: 1rem 0; }
        .combo-name { font-size: 2.5rem; font-weight: 700; }
        .combo-sequence { font-size: 1.2rem; color: var(--text-muted); margin-top: 0.3rem; }

        .move-display {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 1rem 0;
        }

        /* --- Library list --- */
        .library-list { display: flex; flex-direction: column; gap: 0.5rem; }

        .library-item {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 0.75rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info { display: flex; flex-direction: column; gap: 0.2rem; }
        .item-info strong { font-size: 1rem; }
        .item-info span { font-size: 0.85rem; color: var(--text-muted); }
        .item-desc { font-style: italic; }

        .empty-state { text-align: center; padding: 3rem 0; }
        .empty-state p { margin-bottom: 1rem; color: var(--text-muted); }

        /* --- Loading --- */
        #loading {
            text-align: center;
            padding: 4rem 0;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            #app { padding: 1rem; }
            .timer-display { font-size: 3rem; }
            .card-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
        }
    </style>
</head>
<body>
    <div id="app">
        <div id="loading"></div>
    </div>

    <script>
        // Set loading text and html lang based on browser locale
        (function() {
            var isPt = navigator.language && navigator.language.startsWith('pt');
            document.getElementById('loading').textContent = isPt ? 'Carregando FightDrill...' : 'Loading FightDrill...';
            document.documentElement.lang = isPt ? 'pt-BR' : 'en-US';
        })();
    </script>
    <script type="py" src="./src/main.py" config="./pyscript.toml"></script>
</body>
</html>
